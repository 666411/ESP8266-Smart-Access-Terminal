; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Library dependencies
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.5
    adafruit/Adafruit SSD1306 @ ^2.5.7
    bblanchon/ArduinoJson @ ^6.21.3  ; 虽然当前代码没用 JSON 解析，但保留以备将来扩展
    ;arduino-libraries/SoftwareSerial @ ^1.0 ; For communication with QR Scanner
    ; Built-in libraries, no need to list explicitly usually, but doesn't hurt
    ; ESP8266WiFi
    ; ESP8266HTTPClient

; Optional: Increase UART buffer size if experiencing issues with long QR codes
; build_flags = -D SERIAL_RX_BUFFER_SIZE=256

; Optional: Specify upload/monitor port if auto-detection fails
; upload_port = COM3
; monitor_port = COM3
